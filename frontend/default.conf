server {
    listen 80;
    server_name _;

    # Healthcheck propio del contenedor (lo usa el target group del ALB)
    location /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # "/api/*" lo enruta el ALB directo al target group del backend (regla de
    # listener por path), no llega a este nginx. Solo queda servir el front.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
