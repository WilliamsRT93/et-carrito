server {
    listen 80;
    server_name _;

    # Healthcheck propio del contenedor (lo usa el target group del ALB)
    location /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # En AWS, el ALB enruta "/api/*" directo al target group del backend (regla
    # de listener por path) y esta ruta nunca llega a este nginx. En desarrollo
    # local (docker-compose, sin ALB) SI se usa: reenvia al servicio "backend".
    # El host se resuelve en tiempo de request (variable + resolver), no al
    # arrancar nginx: en ECS no existe DNS "backend" y un proxy_pass estatico
    # tumba el arranque del contenedor entero con "host not found in upstream".
    resolver 127.0.0.11 ipv6=off valid=10s;
    location /api/ {
        set $backend_upstream "backend";
        proxy_pass http://$backend_upstream:5000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
